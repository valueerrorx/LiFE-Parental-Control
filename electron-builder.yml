appId: "org.tuxfamily.life-kiosk"
productName: "LiFE Parental Control"
copyright: "Copyright © 2024 Thomas Michael Weissel"

# Packaged Electron ignores NODE_OPTIONS (dev shells often set it); avoids startup warning and matches production expectations.
electronFuses:
  enableNodeOptionsEnvironmentVariable: false

directories:
  output: "dist"

# electron-vite compiles everything into out/; only that + package.json need to be packaged
files:
  - out/**/*
  - package.json

extraResources:
  - from: "kiosk"
    to: "kiosk"
    filter: ["**/*.kiosk"]
  - from: "profiles"
    to: "profiles"
    filter: ["**/*.profile"]
  - from: "images"
    to: "images"
  - from: "hagezi"
    to: "hagezi"
    filter: ["**/*.txt"]
  - from: "packaging/polkit"
    to: "polkit"
    filter: ["**/*.policy", "**/*.rules"]
  - from: "daemon/parental-control-daemon.js"
    to: "daemon/parental-control-daemon.js"
  - from: "packaging/systemd/parental-control.service"
    to: "systemd/parental-control.service"

linux:
  executableName: life-parental-control
  target:
    - target: AppImage
      arch: [x64]
    - target: deb
      arch: [x64]
  category: System
  maintainer: "Thomas Michael Weissel"
  description: "Parental controls for KDE Plasma: kiosk lockdown, web filter, screen time, app blocking and daily app quotas."
  icon: images/pc.png

deb:
  afterInstall: packaging/debian/postinst.sh
  afterRemove: packaging/debian/postrm.sh
