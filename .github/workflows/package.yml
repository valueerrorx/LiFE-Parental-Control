# Full electron-builder run (AppImage + deb); manual only — releases + tags are handled by package-on-version-bump.yml (avoids duplicate builds when the release workflow creates tag v*).

name: Package

on:
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
      - run: npm ci
      - run: npm run build
        env:
          ELECTRON_BUILDER_PUBLISH: never
      - uses: actions/upload-artifact@v4
        with:
          name: linux-dist
          path: dist/*
